name: vbio-cap-colabfold-server

services:
  colabfold-server:
    build:
      context: ../..
      dockerfile: deploy/docker/DOCKER_CAP_COLABFOLD_SERVER.Dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        no_proxy: ${no_proxy:-}
        GO_DOWNLOAD_URL: ${GO_DOWNLOAD_URL:-}
        GO_MODULE_PROXY: ${GO_MODULE_PROXY:-}
        GO_SUMDB: ${GO_SUMDB:-}
        MMSEQS_DOWNLOAD_URL: ${MMSEQS_DOWNLOAD_URL:-}
    image: ${COLABFOLD_SERVER_IMAGE:-vbio-colabfold-server}
    container_name: ${COLABFOLD_SERVER_CONTAINER_NAME:-vbio-colabfold-server}
    restart: unless-stopped
    init: true
    gpus: ${COLABFOLD_DOCKER_GPUS:-all}
    user: "${COLABFOLD_UID:-1000}:${COLABFOLD_GID:-1000}"
    environment:
      UID: ${COLABFOLD_UID:-1000}
      GID: ${COLABFOLD_GID:-1000}
      DB_DIR: /app/databases
      MMSEQS_LOAD_MODE: ${COLABFOLD_MMSEQS_LOAD_MODE:-2}
      COLABFOLD_ENABLE_GPU: ${COLABFOLD_ENABLE_GPU:-0}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
      http_proxy: ${http_proxy:-}
      https_proxy: ${https_proxy:-}
      no_proxy: ${no_proxy:-}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
      PDB_SERVER: ${PDB_SERVER:-rsync.wwpdb.org::ftp}
      PDB_PORT: ${PDB_PORT:-33444}
      PDB_AWS_DOWNLOAD: ${PDB_AWS_DOWNLOAD:-}
      PDB_AWS_SNAPSHOT: ${PDB_AWS_SNAPSHOT:-20240101}
    ports:
      - "${COLABFOLD_SERVER_PORT:-8080}:8080"
    volumes:
      - ${COLABFOLD_DB_DIR:-/data/colabfold/databases}:/app/databases
      - ${COLABFOLD_JOBS_DIR:-/data/colabfold/jobs}:/app/jobs
      - ${COLABFOLD_CONFIG_PATH:-../../capabilities/colabfold_server/config.json}:/app/config.json:ro
    shm_size: ${COLABFOLD_SHM_SIZE:-64gb}
    mem_limit: ${COLABFOLD_MEM_LIMIT:-96g}
