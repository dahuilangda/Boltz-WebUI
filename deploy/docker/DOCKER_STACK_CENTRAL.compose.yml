name: vbio-central

services:
  redis:
    image: redis:7
    container_name: vbio-central-redis
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ../..
      dockerfile: deploy/docker/DOCKER_BACKEND_RUNTIME.Dockerfile
    container_name: vbio-central-api
    restart: unless-stopped
    working_dir: ${BOLTZ_HOST_ROOT}
    env_file:
      - ./DOCKER_STACK_CENTRAL.env
    volumes:
      - ${BOLTZ_HOST_ROOT}:${BOLTZ_HOST_ROOT}
      - ${RESULTS_BASE_DIR:-/data/boltz_central_results}:${RESULTS_BASE_DIR:-/data/boltz_central_results}
    command: >-
      bash -lc "cd ${BOLTZ_HOST_ROOT} && python -m backend.scripts.runtime_entrypoint api"
    ports:
      - "${API_HOST_PORT:-5000}:5000"
    depends_on:
      redis:
        condition: service_healthy

  monitor:
    build:
      context: ../..
      dockerfile: deploy/docker/DOCKER_BACKEND_RUNTIME.Dockerfile
    container_name: vbio-central-monitor
    restart: unless-stopped
    working_dir: ${BOLTZ_HOST_ROOT}
    env_file:
      - ./DOCKER_STACK_CENTRAL.env
    environment:
      MONITOR_API_URL: http://api:5000
    volumes:
      - ${BOLTZ_HOST_ROOT}:${BOLTZ_HOST_ROOT}
    command: >-
      bash -lc "cd ${BOLTZ_HOST_ROOT} && python -m backend.scripts.runtime_entrypoint monitor"
    depends_on:
      api:
        condition: service_started

volumes:
  redis_data:
